apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3sc-operator
  namespace: claude-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k3sc-operator
  template:
    metadata:
      labels:
        app: k3sc-operator
    spec:
      serviceAccountName: dispatcher
      containers:
        - name: operator
          image: claude-agent:latest
          imagePullPolicy: Never
          command: ["/usr/local/bin/k3sc", "operator"]
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: dispatcher-scripts
              mountPath: /etc/dispatcher
            - name: codex-sessions
              mountPath: /home/claude/.codex/sessions
              readOnly: true
            - name: k3sc-config
              mountPath: /home/claude/.k3sc.yaml
              subPath: config.yaml
              readOnly: true
            - name: cost-ledger
              mountPath: /home/claude/.k3sc-costs.jsonl
      volumes:
        - name: dispatcher-scripts
          configMap:
            name: dispatcher-scripts
        - name: codex-sessions
          hostPath:
            path: __HOME_WSL__/.codex/sessions
            type: DirectoryOrCreate
        - name: k3sc-config
          configMap:
            name: k3sc-config
        - name: cost-ledger
          hostPath:
            path: __HOME_WSL__/.k3sc-costs.jsonl
            type: FileOrCreate
