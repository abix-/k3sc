apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-dispatcher
  namespace: claude-agents
spec:
  schedule: "*/3 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: dispatcher
          containers:
            - name: dispatcher
              image: claude-agent:latest
              imagePullPolicy: Never
              command: ["/usr/local/bin/k3sc", "dispatch"]
              env:
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: claude-secrets
                      key: GITHUB_TOKEN
              volumeMounts:
                - name: dispatcher-scripts
                  mountPath: /etc/dispatcher
          volumes:
            - name: dispatcher-scripts
              configMap:
                name: dispatcher-scripts
---
# RBAC: dispatcher needs permission to manage jobs, inspect recent pod failures, and back off its own schedule.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatcher
  namespace: claude-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dispatcher
  namespace: claude-agents
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dispatcher
  namespace: claude-agents
subjects:
  - kind: ServiceAccount
    name: dispatcher
    namespace: claude-agents
roleRef:
  kind: Role
  name: dispatcher
  apiGroup: rbac.authorization.k8s.io