apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatcher
  namespace: claude-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dispatcher
  namespace: claude-agents
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["k3sc.abix.dev"]
    resources: ["agentjobs", "agentjobs/status", "dispatchstates", "dispatchstates/status", "reviewleases", "reviewleases/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dispatcher
  namespace: claude-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dispatcher
subjects:
  - kind: ServiceAccount
    name: dispatcher
    namespace: claude-agents
