apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: claudetasks.k3sc.abix.dev
spec:
  group: k3sc.abix.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                repo:
                  type: string
                repoName:
                  type: string
                issueNumber:
                  type: integer
                repoURL:
                  type: string
              required: [repo, repoName, issueNumber, repoURL]
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Assigned, Running, Succeeded, Failed, Blocked]
                agent:
                  type: string
                slot:
                  type: integer
                jobName:
                  type: string
                lastError:
                  type: string
                reported:
                  type: boolean
                logTail:
                  type: string
                nextAction:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                finishedAt:
                  type: string
                  format: date-time
          required: [spec]
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Repo
          type: string
          jsonPath: .spec.repoName
        - name: Issue
          type: integer
          jsonPath: .spec.issueNumber
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Agent
          type: string
          jsonPath: .status.agent
        - name: Next
          type: string
          jsonPath: .status.nextAction
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: claudetasks
    singular: claudetask
    kind: ClaudeTask
    shortNames:
      - ct
