apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentjobs.k3sc.abix.dev
spec:
  group: k3sc.abix.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                repo:
                  type: string
                repoName:
                  type: string
                issueNumber:
                  type: integer
                repoURL:
                  type: string
                slot:
                  type: integer
                agent:
                  type: string
                family:
                  type: string
                originState:
                  type: string
              required: [repo, repoName, issueNumber, repoURL]
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Assigned, Running, Succeeded, Failed, Blocked]
                agent:
                  type: string
                slot:
                  type: integer
                family:
                  type: string
                jobName:
                  type: string
                lastError:
                  type: string
                failureCount:
                  type: integer
                reported:
                  type: boolean
                logTail:
                  type: string
                nextAction:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                finishedAt:
                  type: string
                  format: date-time
          required: [spec]
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Repo
          type: string
          jsonPath: .spec.repoName
        - name: Issue
          type: integer
          jsonPath: .spec.issueNumber
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Agent
          type: string
          jsonPath: .status.agent
        - name: Next
          type: string
          jsonPath: .status.nextAction
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: agentjobs
    singular: agentjob
    kind: AgentJob
    shortNames:
      - aj
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dispatchstates.k3sc.abix.dev
spec:
  group: k3sc.abix.dev
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                triggerNonce:
                  type: integer
                  format: int64
            status:
              type: object
              properties:
                observedTriggerNonce:
                  type: integer
                  format: int64
                idleScans:
                  type: integer
                lastError:
                  type: string
                lastScanTime:
                  type: string
                  format: date-time
                lastWorkTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Idle
          type: integer
          jsonPath: .status.idleScans
        - name: LastScan
          type: date
          jsonPath: .status.lastScanTime
        - name: Trigger
          type: integer
          jsonPath: .spec.triggerNonce
  scope: Namespaced
  names:
    plural: dispatchstates
    singular: dispatchstate
    kind: DispatchState
    shortNames:
      - ds
