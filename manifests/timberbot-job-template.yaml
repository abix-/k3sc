# Template for timberbot player jobs.
# __AGENT_SLOT__, __SLOT_LETTER__, __AGENT_FAMILY__, __TIMBERBOT_GOAL__, __TIMBERBOT_ROUNDS__ are replaced at creation time.
apiVersion: batch/v1
kind: Job
metadata:
  name: "timberbot-__SLOT_LETTER__"
  namespace: claude-agents
  labels:
    app: claude-agent
    job-kind: timberbot
    agent-slot: "__AGENT_SLOT__"
    agent-family: "__AGENT_FAMILY__"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 7200
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: claude-agent
        job-kind: timberbot
        agent-slot: "__AGENT_SLOT__"
        agent-family: "__AGENT_FAMILY__"
    spec:
      securityContext:
        fsGroup: 1000
      restartPolicy: Never
      containers:
        - name: claude-agent
          image: claude-agent:latest
          imagePullPolicy: Never
          env:
            - name: ISSUE_NUMBER
              value: "0"
            - name: AGENT_SLOT
              value: "__AGENT_SLOT__"
            - name: SLOT_LETTER
              value: "__SLOT_LETTER__"
            - name: REPO_URL
              value: "https://github.com/abix-/k3sc.git"
            - name: AGENT_FAMILY
              value: "__AGENT_FAMILY__"
            - name: JOB_KIND
              value: "timberbot"
            - name: PR_NUMBER
              value: "0"
            - name: TIMBERBOT_GOAL
              value: "__TIMBERBOT_GOAL__"
            - name: TIMBERBOT_ROUNDS
              value: "__TIMBERBOT_ROUNDS__"
            - name: TIMBERBOT_HOST
              value: "__TIMBERBOT_HOST__"
            - name: CLAUDE_MODEL
              value: "claude-haiku-4-5-20251001"
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: CLAUDE_CODE_USE_BEDROCK
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CLAUDE_CODE_USE_BEDROCK
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_REGION
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: timberbot
              mountPath: /timberbot
            - name: workspaces
              mountPath: /workspaces
            - name: claude-skills
              mountPath: /home/claude/.claude/skills
              readOnly: true
            - name: claude-docs
              mountPath: /home/claude/.claude/docs
              readOnly: true
            - name: claude-md
              mountPath: /home/claude/.claude/CLAUDE.md
              readOnly: true
      volumes:
        - name: timberbot
          hostPath:
            path: __HOME_WSL__/Documents/Timberborn/Mods/Timberbot
            type: Directory
        - name: workspaces
          persistentVolumeClaim:
            claimName: workspaces
        - name: claude-skills
          hostPath:
            path: __CLAUDE_ROOT__/skills
            type: Directory
        - name: claude-docs
          hostPath:
            path: __CLAUDE_ROOT__/docs
            type: Directory
        - name: claude-md
          hostPath:
            path: __CLAUDE_ROOT__/CLAUDE.md
            type: File
