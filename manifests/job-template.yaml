# Template used by dispatcher to create Jobs.
# __ISSUE_NUMBER__, __AGENT_SLOT__, __REPO_URL__, and __REPO_NAME__ are replaced at creation time.
apiVersion: batch/v1
kind: Job
metadata:
  name: "claude-issue-__ISSUE_NUMBER__"
  namespace: claude-agents
  labels:
    app: claude-agent
    issue-number: "__ISSUE_NUMBER__"
    agent-slot: "__AGENT_SLOT__"
    repo: "__REPO_NAME__"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: claude-agent
        issue-number: "__ISSUE_NUMBER__"
        agent-slot: "__AGENT_SLOT__"
        repo: "__REPO_NAME__"
    spec:
      restartPolicy: Never
      containers:
        - name: claude-agent
          image: claude-agent:latest
          imagePullPolicy: Never
          env:
            - name: ISSUE_NUMBER
              value: "__ISSUE_NUMBER__"
            - name: AGENT_SLOT
              value: "__AGENT_SLOT__"
            - name: REPO_URL
              value: "__REPO_URL__"
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
          volumeMounts:
            - name: cargo-target
              mountPath: /cargo-target
            - name: cargo-home
              mountPath: /cargo-home
            - name: workspaces
              mountPath: /workspaces
            - name: claude-skills
              mountPath: /home/claude/.claude/skills
              readOnly: true
            - name: claude-commands
              mountPath: /home/claude/.claude/commands
              readOnly: true
            - name: claude-docs
              mountPath: /home/claude/.claude/docs
              readOnly: true
            - name: claude-md
              mountPath: /home/claude/.claude/CLAUDE.md
              readOnly: true
            - name: gh-token
              mountPath: /home/claude/.gh-token
              readOnly: true
      volumes:
        - name: cargo-target
          persistentVolumeClaim:
            claimName: cargo-target
        - name: cargo-home
          persistentVolumeClaim:
            claimName: cargo-home
        - name: workspaces
          persistentVolumeClaim:
            claimName: workspaces
        - name: claude-skills
          hostPath:
            path: /mnt/c/Users/Abix/.claude/skills
            type: Directory
        - name: claude-commands
          hostPath:
            path: /mnt/c/Users/Abix/.claude/commands
            type: Directory
        - name: claude-docs
          hostPath:
            path: /mnt/c/Users/Abix/.claude/docs
            type: Directory
        - name: claude-md
          hostPath:
            path: /mnt/c/Users/Abix/.claude/CLAUDE.md
            type: File
        - name: gh-token
          hostPath:
            path: /mnt/c/Users/Abix/.gh-token
            type: File
