# Template used by dispatcher to create Jobs.
# __ISSUE_NUMBER__, __AGENT_SLOT__, __SLOT_LETTER__, __REPO_URL__, __REPO_NAME__, and __AGENT_FAMILY__ are replaced at creation time.
apiVersion: batch/v1
kind: Job
metadata:
  name: "__AGENT_FAMILY__-issue-__ISSUE_NUMBER__"
  namespace: claude-agents
  labels:
    app: claude-agent
    issue-number: "__ISSUE_NUMBER__"
    agent-slot: "__AGENT_SLOT__"
    agent-family: "__AGENT_FAMILY__"
    repo: "__REPO_NAME__"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: claude-agent
        issue-number: "__ISSUE_NUMBER__"
        agent-slot: "__AGENT_SLOT__"
        agent-family: "__AGENT_FAMILY__"
        repo: "__REPO_NAME__"
    spec:
      restartPolicy: Never
      containers:
        - name: claude-agent
          image: claude-agent:latest
          imagePullPolicy: Never
          env:
            - name: ISSUE_NUMBER
              value: "__ISSUE_NUMBER__"
            - name: AGENT_SLOT
              value: "__AGENT_SLOT__"
            - name: SLOT_LETTER
              value: "__SLOT_LETTER__"
            - name: REPO_URL
              value: "__REPO_URL__"
            - name: AGENT_FAMILY
              value: "__AGENT_FAMILY__"
            - name: JOB_KIND
              value: "__JOB_KIND__"
            - name: PR_NUMBER
              value: "__PR_NUMBER__"
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: GITHUB_TOKEN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: CODEX_AUTH_JSON
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CODEX_AUTH_JSON
                  optional: true
          volumeMounts:
            - name: cargo-target
              mountPath: /cargo-target
            - name: cargo-home
              mountPath: /cargo-home
            - name: workspaces
              mountPath: /workspaces
            - name: codex-sessions
              mountPath: /home/claude/.codex/sessions
            - name: claude-skills
              mountPath: /home/claude/.claude/skills
              readOnly: true
            - name: claude-commands
              mountPath: /home/claude/.claude/commands
              readOnly: true
            - name: claude-docs
              mountPath: /home/claude/.claude/docs
              readOnly: true
            - name: claude-md
              mountPath: /home/claude/.claude/CLAUDE.md
              readOnly: true
      volumes:
        - name: cargo-target
          persistentVolumeClaim:
            claimName: cargo-target
        - name: cargo-home
          persistentVolumeClaim:
            claimName: cargo-home
        - name: workspaces
          persistentVolumeClaim:
            claimName: workspaces
        - name: codex-sessions
          hostPath:
            path: /mnt/c/Users/Abix/.codex/sessions
            type: DirectoryOrCreate
        - name: claude-skills
          hostPath:
            path: /mnt/c/Users/Abix/.claude/skills
            type: Directory
        - name: claude-commands
          hostPath:
            path: /mnt/c/Users/Abix/.claude/commands
            type: Directory
        - name: claude-docs
          hostPath:
            path: /mnt/c/Users/Abix/.claude/docs
            type: Directory
        - name: claude-md
          hostPath:
            path: /mnt/c/Users/Abix/.claude/CLAUDE.md
            type: File
