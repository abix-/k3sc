# Template used by dispatcher to create Jobs.
# __ISSUE_NUMBER__, __AGENT_SLOT__, __SLOT_LETTER__, __REPO_URL__, __REPO_NAME__, and __AGENT_FAMILY__ are replaced at creation time.
apiVersion: batch/v1
kind: Job
metadata:
  name: "__AGENT_FAMILY__-issue-__ISSUE_NUMBER__"
  namespace: claude-agents
  labels:
    app: claude-agent
    issue-number: "__ISSUE_NUMBER__"
    agent-slot: "__AGENT_SLOT__"
    agent-family: "__AGENT_FAMILY__"
    repo: "__REPO_NAME__"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: claude-agent
        issue-number: "__ISSUE_NUMBER__"
        agent-slot: "__AGENT_SLOT__"
        agent-family: "__AGENT_FAMILY__"
        repo: "__REPO_NAME__"
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      restartPolicy: Never
      containers:
        - name: claude-agent
          image: claude-agent:latest
          imagePullPolicy: Never
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: ISSUE_NUMBER
              value: "__ISSUE_NUMBER__"
            - name: AGENT_SLOT
              value: "__AGENT_SLOT__"
            - name: SLOT_LETTER
              value: "__SLOT_LETTER__"
            - name: REPO_URL
              value: "__REPO_URL__"
            - name: AGENT_FAMILY
              value: "__AGENT_FAMILY__"
            - name: JOB_KIND
              value: "__JOB_KIND__"
            - name: PR_NUMBER
              value: "__PR_NUMBER__"
            - name: SAFETY_BRANCH_PATTERN
              value: "__SAFETY_BRANCH_PATTERN__"
            - name: SAFETY_GH_ALLOWED
              value: "__SAFETY_GH_ALLOWED__"
            - name: SAFETY_BLOCKED_COMMIT_WORDS
              value: "__SAFETY_BLOCKED_COMMIT_WORDS__"
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: GITHUB_TOKEN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: CODEX_AUTH_JSON
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CODEX_AUTH_JSON
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: CLAUDE_CODE_USE_BEDROCK
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: CLAUDE_CODE_USE_BEDROCK
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_REGION
                  optional: true
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secrets
                  key: AWS_SESSION_TOKEN
                  optional: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: claude-home
              mountPath: /home/claude
            - name: gh-wrapper
              mountPath: /opt/gh-wrapper
            - name: cargo-target
              mountPath: /cargo-target
            - name: cargo-home
              mountPath: /cargo-home
            - name: workspaces
              mountPath: /workspaces
            - name: codex-sessions
              mountPath: /home/claude/.codex/sessions
            - name: claude-skills
              mountPath: /home/claude/.claude/skills
              readOnly: true
            - name: claude-docs
              mountPath: /home/claude/.claude/docs
              readOnly: true
            - name: claude-md
              mountPath: /home/claude/.claude/CLAUDE.md
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: claude-home
          emptyDir: {}
        - name: gh-wrapper
          emptyDir: {}
        - name: cargo-target
          persistentVolumeClaim:
            claimName: cargo-target
        - name: cargo-home
          persistentVolumeClaim:
            claimName: cargo-home
        - name: workspaces
          persistentVolumeClaim:
            claimName: workspaces
        - name: codex-sessions
          hostPath:
            path: __HOME_WSL__/.codex/sessions
            type: DirectoryOrCreate
        - name: claude-skills
          hostPath:
            path: __CLAUDE_ROOT__/skills
            type: Directory
        - name: claude-docs
          hostPath:
            path: __CLAUDE_ROOT__/docs
            type: Directory
        - name: claude-md
          hostPath:
            path: __CLAUDE_ROOT__/CLAUDE.md
            type: File
